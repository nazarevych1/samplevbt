SYMBOL: HES

# Client input file (ar_bt.xlsx format)
INPUT_FILE: ../data/ar_bt.xlsx
INPUT_SHEET: data

# Optional date filter (omit or null for full file)
BACKTESTING_START_DATE: null
BACKTESTING_END_DATE: null

# Bar frequency for VectorBT metrics (3-minute bars in client file)
FREQ: 3min

INIT_BALANCE: 100000
POSITION_SIZE: 1000
POSITION_SIZE_TYPE: amount
FEES: 0
SLIPPAGE: 0

# When true: exit on EXIT signal OR when Low <= stoploss_buy (long) / High >= stoploss_sell (short)
USE_STOP_LOSS: false

# Cache parsed Excel as .parquet next to input for faster re-runs
CACHE_PARQUET: true
