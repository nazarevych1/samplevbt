SYMBOL: AAPL

EXECUTION_TIMEFRAME: 1min
EXECUTION_FREQ: 1min
SIGNALS_TIMEFRAME: daily

BACKTESTING_START_DATE: '2020-01-01'
BACKTESTING_END_DATE: '2025-10-01'
CONVERT_TO_NY_TIMEZONE: false
ALLOW_SHORT: true
FEES: 0
INIT_BALANCE: 100000
POSITION_SIZE: 4
POSITION_SIZE_TYPE: amount
SLIPPAGE: 0
SMA_FAST: 20
SMA_SLOW: 50

# In-sample grid search (each WFO train window)
OPTIMIZATION_STEP: 10
OPTIMIZATION_START: 10
OPTIMIZATION_END: 40

# Walk-forward windows (rolling train -> test -> step forward)
WFO:
  START_DATE: '2020-01-01'
  END_DATE: '2025-10-01'
  TRAIN_MONTHS: 24
  TEST_MONTHS: 6
  STEP_MONTHS: 6
  ANCHORED_TRAIN: false
  MIN_SIGNALS_BARS: 60

# How to pick best params on each train window
WFO_SELECTION:
  METRIC: sharpe_ratio
  DIRECTION: max
